
# =========================
# DATABASE
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=true
spring.flyway.postgresql.transactional-lock=false
logging.level.org.flywaydb=INFO


# =========================
# JPA
# =========================

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# =========================
# SERVER
# =========================
server.port=9000
server.address=0.0.0.0
spring.application.name=women-concern-api

logging.level.org.springframework.security=DEBUG
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# =========================
# BREVO
# =========================
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
brevo.api.key=${BREVO_API_KEY}
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}


#jwt
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-seconds=${JWT_ACCESS_EXPIRY_SECONDS}


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persist-authorization=true

#CLOUDINARY

cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID
