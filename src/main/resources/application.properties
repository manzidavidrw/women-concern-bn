# =========================
# KEYCLOAK CONFIG
# =========================
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL}
keycloak.realm=${KEYCLOAK_REALM}
keycloak.client-id=${KEYCLOAK_CLIENT_ID}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}

keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:dmis-backend}
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:${KEYCLOAK_CLIENT_SECRET}}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}


# =========================
# DATABASE
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# =========================
# JPA
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# =========================
# SERVER
# =========================
server.port=8080
server.address=0.0.0.0
spring.application.name=women-concern-api

logging.level.org.springframework.security=DEBUG
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# =========================
# SECURITY (KEYCLOAK JWT)
# =========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}