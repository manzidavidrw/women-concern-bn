# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=${PORT}
spring.application.name=women-concern-api

# Keycloak - Spring validates tokens against this issuer automatically
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

# Keycloak admin (for user management API later)
keycloak.server-url=${KEYCLOACK_SERVER}
keycloak.realm=${KEYCLOACK_REALM}
keycloak.client-id=${KEYCLOACK_CLIENT_ID}
keycloak.client-secret=${KEYCLOACK_SECRET}